<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChargeShield — Evidence Viewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f6f6f7;
      color: #202223;
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── Mock Shopify top bar ── */
    .topbar {
      background: #1a1a2e;
      color: #fff;
      height: 56px;
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .topbar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 16px;
      color: #fff;
      text-decoration: none;
    }
    .topbar-logo .shield {
      width: 30px; height: 30px;
      border-radius: 8px;
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }
    .topbar-logo .shield img { width: 100%; height: 100%; object-fit: contain; }
    .topbar-store { margin-left: auto; font-size: 13px; color: rgba(255,255,255,0.55); background: rgba(255,255,255,0.07); padding: 5px 12px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.12); }
    .demo-badge { background: #f59e0b; color: #78350f; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.8px; padding: 3px 8px; border-radius: 4px; }

    /* ── Page ── */
    .page { max-width: 880px; margin: 0 auto; padding: 28px 24px 48px; }

    .back-btn {
      background: none; border: none; cursor: pointer;
      color: #6b7280; font-size: 14px; margin-bottom: 20px; padding: 0;
      display: flex; align-items: center; gap: 6px;
      text-decoration: none;
    }
    .back-btn:hover { color: #111827; }

    /* ── Header card ── */
    .header-card {
      background: #fff;
      border: 1px solid #e1e3e5;
      border-radius: 12px;
      padding: 24px 28px;
      margin-bottom: 20px;
    }
    .header-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; flex-wrap: wrap; margin-bottom: 20px; }
    .order-title { font-size: 22px; font-weight: 800; color: #111827; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 4px; }
    .order-sub { font-size: 13px; color: #6b7280; }

    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
    .stat-tile { background: #f9fafb; border-radius: 8px; padding: 12px 14px; }
    .stat-tile.critical-bg { background: #fef2f2; }
    .stat-tile.caution-bg  { background: #fffbeb; }
    .tile-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: #9ca3af; margin-bottom: 4px; }
    .tile-value { font-size: 18px; font-weight: 800; color: #111827; }
    .tile-value.critical { color: #dc2626; }
    .tile-value.caution  { color: #d97706; }
    .tile-sub { display: block; font-size: 12px; font-weight: 400; color: #6b7280; margin-top: 2px; }

    .btn-primary { background: #1e40af; color: #fff; font-weight: 700; font-size: 14px; padding: 10px 18px; border-radius: 8px; border: none; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
    .btn-pending { font-size: 13px; color: #9ca3af; background: #f9fafb; border: 1px solid #e1e3e5; border-radius: 8px; padding: 10px 16px; }

    /* ── Collapsible sections ── */
    .section { border: 1px solid #e5e7eb; border-radius: 10px; margin-bottom: 14px; overflow: hidden; background: #fff; }
    .section-toggle {
      width: 100%; display: flex; align-items: center; gap: 12px;
      padding: 14px 20px;
      background: #f9fafb;
      border: none; border-bottom: 1px solid #e5e7eb;
      cursor: pointer; text-align: left;
    }
    .section-toggle.closed { background: #fff; border-bottom: none; }
    .section-accent { width: 3px; height: 18px; background: #1e40af; border-radius: 2px; flex-shrink: 0; }
    .section-title { flex: 1; font-weight: 700; font-size: 15px; color: #111827; }
    .section-chevron { font-size: 14px; color: #9ca3af; }
    .section-body { padding: 20px; display: none; }
    .section-body.open { display: block; }

    /* ── KV Grid ── */
    .kv-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
    .kv-tile { background: #f9fafb; border-radius: 8px; padding: 12px 14px; }
    .kv-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: #9ca3af; margin-bottom: 4px; }
    .kv-value { font-size: 14px; font-weight: 600; color: #111827; }

    /* ── Tables ── */
    table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 16px; }
    thead tr { background: #f9fafb; }
    th { padding: 10px 12px; text-align: left; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #6b7280; border-bottom: 1px solid #e5e7eb; }
    th.right { text-align: right; }
    td { padding: 10px 12px; border-bottom: 1px solid #f3f4f6; }
    td.right { text-align: right; }
    td.mono { font-family: monospace; font-size: 12px; color: #6b7280; }

    /* ── Tracking box ── */
    .tracking-box { background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 8px; padding: 16px; margin-bottom: 12px; }
    .tracking-label { font-size: 11px; color: #6b7280; margin-bottom: 4px; }
    .tracking-num { font-family: monospace; font-size: 16px; font-weight: 700; color: #1e40af; }
    .tracking-link { font-size: 12px; color: #1e40af; margin-top: 4px; display: inline-block; }

    /* ── Address blocks ── */
    .address-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px; }
    @media (max-width: 500px) { .address-grid { grid-template-columns: 1fr; } }
    .address-block { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 8px; padding: 16px; }
    .address-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: #6b7280; margin-bottom: 8px; }
    .address-text { font-size: 13px; color: #374151; line-height: 1.7; }

    /* ── Risk table level badges ── */
    .risk-high   { background: #fef2f2; color: #dc2626; }
    .risk-medium { background: #fffbeb; color: #92400e; }
    .risk-low    { background: #f0fdf4; color: #16a34a; }
    .risk-badge { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; padding: 3px 10px; border-radius: 20px; }

    /* ── Badges (shared) ── */
    .badge { display: inline-block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; padding: 3px 10px; border-radius: 20px; }
    .badge-critical { background: #fef2f2; color: #dc2626; }
    .badge-success  { background: #f0fdf4; color: #16a34a; }
    .badge-caution  { background: #fffbeb; color: #92400e; }
    .badge-info     { background: #eff6ff; color: #1d4ed8; }
    .badge-subdued  { background: #f3f4f6; color: #6b7280; }

    /* ── Notice ── */
    .notice { background: #fffbeb; border: 1px solid #fde68a; border-radius: 6px; padding: 10px 14px; font-size: 12px; color: #78350f; margin-top: 14px; }
  </style>
</head>

    function statusBadge(status) {
      const map = { needs_response:['Needs Response','critical'], under_review:['Under Review','caution'], won:['Won','success'], lost:['Lost','critical'], accepted:['Accepted','caution'], charge_refunded:['Refunded','caution'], expired:['Expired','subdued'] };
      const [label, tone] = map[status] ?? [status,'subdued'];
      return `<span class="badge badge-${tone}">${label}</span>`;
    }

    function renderDaysLeft(dl, dueAt) {
      const cls = dl <= 3 && dl > 0 ? 'critical' : dl <= 7 && dl > 0 ? 'caution' : '';
      const bg  = dl <= 3 && dl > 0 ? 'critical-bg' : dl <= 7 && dl > 0 ? 'caution-bg' : '';
      const label = dl <= 0 ? 'Overdue' : `${dl}d left`;
      return `<div class="stat-tile ${bg}">
        <div class="tile-label">Evidence Due</div>
        <div class="tile-value ${cls}">${label}<span class="tile-sub">${fmtDate(dueAt)}</span></div>
      </div>`;
    }

    function collapseToggle(id, defaultOpen) {
      const body = document.getElementById(id);
      const btn  = document.getElementById('btn-' + id);
      if (!body || !btn) return;
      if (defaultOpen) { body.classList.add('open'); btn.classList.remove('closed'); }
      btn.addEventListener('click', () => {
        const isOpen = body.classList.toggle('open');
        btn.classList.toggle('closed', !isOpen);
        btn.querySelector('.section-chevron').textContent = isOpen ? '▲' : '▼';
      });
    }

    function riskBadge(level) {
      return `<span class="risk-badge risk-${level}">${level.toUpperCase()}</span>`;
    }

    function renderPage(data) {
      const dl = daysLeft(data.dueAt);
      const order = data.order_details || {};
      const lineItems = order.line_items || [];
      const billing = order.billing_address;
      const shipping = order.shipping_address;
      const fulfillments = data.fulfillments || [];
      const customer = data.customer;
      const risks = data.risks || [];

      const highestRisk = risks.reduce((max, r) => {
        const lvl = { low:0, medium:1, high:2 };
        return (lvl[r.level] ?? 0) > (lvl[max] ?? 0) ? r.level : max;
      }, 'low');

      const pdfBtn = data.hasPdf && data.pdfUrl
        ? `<a href="${data.pdfUrl}" target="_blank" class="btn-primary">↓ Download PDF</a>`
        : `<span class="btn-pending">PDF generating…</span>`;

      const addressBlocks = [billing, shipping].filter(Boolean);
      const addrHTML = addressBlocks.length ? `
        <div class="address-grid">
          ${billing ? `<div class="address-block"><div class="address-label">Billing Address</div><div class="address-text">${billing.name}<br>${billing.address1}${billing.address2 ? ', '+billing.address2 : ''}<br>${billing.city}, ${billing.province} ${billing.zip}<br>${billing.country}</div></div>` : ''}
          ${shipping ? `<div class="address-block"><div class="address-label">Shipping Address</div><div class="address-text">${shipping.name}<br>${shipping.address1}${shipping.address2 ? ', '+shipping.address2 : ''}<br>${shipping.city}, ${shipping.province} ${shipping.zip}<br>${shipping.country}</div></div>` : ''}
        </div>` : '';

      const lineItemsHTML = lineItems.length ? `
        <table style="margin-top:16px">
          <thead><tr>
            <th>Item</th><th>SKU</th><th class="right">Qty</th><th class="right">Unit Price</th><th class="right">Total</th>
          </tr></thead>
          <tbody>${lineItems.map(item => `
            <tr>
              <td><div style="font-weight:600">${item.title}</div>${item.variant_title ? `<div style="font-size:12px;color:#6b7280">${item.variant_title}</div>` : ''}</td>
              <td class="mono">${item.sku || '—'}</td>
              <td class="right">${item.quantity}</td>
              <td class="right">${order.currency} ${Number(item.price).toFixed(2)}</td>
              <td class="right" style="font-weight:600">${order.currency} ${(Number(item.price) * item.quantity).toFixed(2)}</td>
            </tr>`).join('')}
          </tbody>
        </table>` : '';

      const fulfillHTML = fulfillments.length ? fulfillments.map(f => {
        const nums = f.tracking_numbers?.length ? f.tracking_numbers : f.tracking_number ? [f.tracking_number] : [];
        return nums.map(num => `
          <div class="tracking-box">
            <div class="tracking-label">Tracking Number</div>
            <div class="tracking-num">${num}</div>
            ${f.tracking_url && f.tracking_url !== '#' ? `<a href="${f.tracking_url}" target="_blank" class="tracking-link">Track package →</a>` : ''}
          </div>`).join('')
          + `<div class="kv-grid" style="margin-top:8px">
            <div class="kv-tile"><div class="kv-label">Carrier</div><div class="kv-value">${f.tracking_company || '—'}</div></div>
            <div class="kv-tile"><div class="kv-label">Status</div><div class="kv-value">${(f.shipment_status || f.status || '—').replace(/_/g,' ')}</div></div>
            <div class="kv-tile"><div class="kv-label">Fulfilled At</div><div class="kv-value">${f.created_at ? fmtDateShort(f.created_at) : '—'}</div></div>
          </div>`;
      }).join('<hr style="border:none;border-top:1px solid #f3f4f6;margin:20px 0">') : '<p style="color:#9ca3af;font-style:italic">No fulfillment records found for this order.</p>';

      const customerHTML = customer ? `
        <div class="kv-grid">
          <div class="kv-tile"><div class="kv-label">Name</div><div class="kv-value">${customer.first_name} ${customer.last_name}</div></div>
          <div class="kv-tile"><div class="kv-label">Email</div><div class="kv-value">${customer.email}</div></div>
          <div class="kv-tile"><div class="kv-label">Phone</div><div class="kv-value">${customer.phone || '—'}</div></div>
          <div class="kv-tile"><div class="kv-label">Total Orders</div><div class="kv-value">${customer.orders_count}</div></div>
          <div class="kv-tile"><div class="kv-label">Lifetime Spend</div><div class="kv-value">${customer.currency} ${customer.total_spent}</div></div>
          <div class="kv-tile"><div class="kv-label">Verified Email</div><div class="kv-value">${customer.verified_email ? '✓ Yes' : '✗ No'}</div></div>
          <div class="kv-tile"><div class="kv-label">Customer Since</div><div class="kv-value">${fmtDate(customer.created_at)}</div></div>
        </div>
        <div class="notice">Full order history requires Shopify protected customer data approval.</div>` : '<p style="color:#9ca3af;font-style:italic">Customer data not available.</p>';

      const riskColor = { high:'red', medium:'yellow', low:'green' }[highestRisk];
      const riskBadgeEl = `<span class="badge badge-${riskColor === 'red' ? 'critical' : riskColor === 'yellow' ? 'caution' : 'success'}">${highestRisk.toUpperCase()}</span>`;

      const risksHTML = risks.length ? `
        <table>
          <thead><tr>
            <th>Indicator</th><th>Score</th><th>Level</th><th>Message</th>
          </tr></thead>
          <tbody>${risks.map(r => `
            <tr>
              <td style="font-weight:600;text-transform:capitalize">${r.cause.replace(/_/g,' ')}</td>
              <td style="font-weight:700;text-align:center">${r.score}</td>
              <td>${riskBadge(r.level)}</td>
              <td style="color:#6b7280">${r.message}</td>
            </tr>`).join('')}
          </tbody>
        </table>` : '<p style="color:#9ca3af;font-style:italic">No fraud risk indicators.</p>';

      document.getElementById('content').innerHTML = `
        <!-- Header card -->
        <div class="header-card">
          <div class="header-top">
            <div>
              <div class="order-title">Order ${data.order} ${statusBadge(data.status)}</div>
              <div class="order-sub">Dispute #${data.disputeId} &nbsp;·&nbsp; ${data.reason.replace(/_/g,' ')}</div>
            </div>
            <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">${pdfBtn}</div>
          </div>
          <div class="stats-grid">
            <div class="stat-tile">
              <div class="tile-label">Amount</div>
              <div class="tile-value">${fmtCurrency(data.amount, data.currency)}</div>
            </div>
            ${renderDaysLeft(dl, data.dueAt)}
            <div class="stat-tile">
              <div class="tile-label">Filed</div>
              <div class="tile-value" style="font-size:14px">${fmtDateShort(data.createdAt)}</div>
            </div>
            <div class="stat-tile">
              <div class="tile-label">Network Reason</div>
              <div class="tile-value" style="font-size:13px;font-weight:600">${data.networkReason}</div>
            </div>
          </div>
        </div>

        <!-- Order Proof -->
        <div class="section">
          <button class="section-toggle" id="btn-sec-order" onclick="">
            <div class="section-accent"></div>
            <span class="section-title">Order Proof</span>
            <span class="section-chevron">▲</span>
          </button>
          <div class="section-body" id="sec-order">
            <div class="kv-grid">
              <div class="kv-tile"><div class="kv-label">Order</div><div class="kv-value">${order.name || data.order}</div></div>
              <div class="kv-tile"><div class="kv-label">Order Date</div><div class="kv-value">${order.created_at ? fmtDate(order.created_at) : '—'}</div></div>
              <div class="kv-tile"><div class="kv-label">Total</div><div class="kv-value">${order.currency} ${order.total_price}</div></div>
              <div class="kv-tile"><div class="kv-label">Financial Status</div><div class="kv-value" style="text-transform:capitalize">${(order.financial_status || '—').replace(/_/g,' ')}</div></div>
              <div class="kv-tile"><div class="kv-label">Fulfillment Status</div><div class="kv-value" style="text-transform:capitalize">${(order.fulfillment_status || 'unfulfilled').replace(/_/g,' ')}</div></div>
              <div class="kv-tile"><div class="kv-label">Customer Email</div><div class="kv-value">${order.email || '—'}</div></div>
            </div>
            ${lineItemsHTML}
            ${addrHTML}
          </div>
        </div>

        <!-- Shipping -->
        <div class="section">
          <button class="section-toggle" id="btn-sec-ship" onclick="">
            <div class="section-accent"></div>
            <span class="section-title">Shipping &amp; Fulfillment</span>
            <span class="section-chevron">▲</span>
          </button>
          <div class="section-body" id="sec-ship">${fulfillHTML}</div>
        </div>

        <!-- Customer -->
        <div class="section">
          <button class="section-toggle closed" id="btn-sec-cust" onclick="">
            <div class="section-accent"></div>
            <span class="section-title">Customer History</span>
            <span class="section-chevron">▼</span>
          </button>
          <div class="section-body" id="sec-cust">${customerHTML}</div>
        </div>

        <!-- Fraud Signals -->
        <div class="section">
          <button class="section-toggle${highestRisk === 'low' ? ' closed' : ''}" id="btn-sec-risk" onclick="">
            <div class="section-accent"></div>
            <span class="section-title">Fraud Signals</span>
            ${riskBadgeEl}
            <span class="section-chevron">${highestRisk === 'low' ? '▼' : '▲'}</span>
          </button>
          <div class="section-body" id="sec-risk">${risksHTML}</div>
        </div>
      `;

      collapseToggle('sec-order', true);
      collapseToggle('sec-ship', true);
      collapseToggle('sec-cust', false);
      collapseToggle('sec-risk', highestRisk !== 'low');
    }

    const params = new URLSearchParams(location.search);
    const id = params.get('id') || '1001';
    const data = EVIDENCE[id];

    if (data) {
      document.title = `ChargeShield — Order ${data.order}`;
      renderPage(data);
    } else {
      document.getElementById('content').innerHTML = '<p style="color:#6b7280">Dispute not found.</p>';
    }
  </script>
</body>
</html>
